name: Daily Cache Refresh

on:
  schedule:
    # 4:30 PM ET = 21:30 UTC (EST) or 20:30 UTC (EDT)
    - cron: '30 21 * * 1-5'  # Weekdays only
  workflow_dispatch:
    inputs:
      skip_cache:
        description: 'Skip cache restore (full refresh from scratch)'
        required: false
        type: boolean
        default: false

env:
  CACHE_PATH: 000-099-investing/007-ticker-analysis/data

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      cache-hit: ${{ steps.cache-restore.outputs.cache-hit }}
      cache-date: ${{ steps.date.outputs.date }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get today's date for cache key
        id: date
        run: echo "date=$(TZ=America/Chicago date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore ticker cache
        id: cache-restore
        if: ${{ github.event_name != 'schedule' && github.event.inputs.skip_cache != 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CACHE_PATH }}
          key: ticker-cache-${{ steps.date.outputs.date }}
          restore-keys: |
            ticker-cache-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install shared-core
        run: |
          cd 000-099-investing/000-shared-core
          pip install -e .

      - name: Install 007-ticker-analysis dependencies
        run: |
          cd 000-099-investing/007-ticker-analysis
          pip install -r requirements.txt

      - name: Create data directory
        run: |
          mkdir -p 000-099-investing/007-ticker-analysis/data/twelve_data
          mkdir -p 000-099-investing/007-ticker-analysis/data/transcripts

      - name: Create config.json from secrets
        run: |
          cd 000-099-investing/007-ticker-analysis
          cat > config.json << EOF
          {
            "google_sheets": {
              "credentials_file": "google_service_account.json",
              "spreadsheet_name": "${{ secrets.GSHEET_NAME }}",
              "main_tab": "Sheet1",
              "ticker_column": "A",
              "start_row": 2,
              "tech_data_tab": "Tech_Data",
              "transcripts_tab": "Transcripts"
            },
            "twelve_data": {
              "api_key": "${{ secrets.TWELVE_DATA_API_KEY }}",
              "output_size": 1000,
              "rate_limit_sleep": 8.0
            },
            "grok": {
              "api_key": "${{ secrets.GROK_API_KEY }}",
              "model": "grok-4-1-fast-reasoning",
              "summarization_enabled": true,
              "max_summary_tokens": 400
            },
            "defeatbeta": {
              "quarters_to_fetch": 1,
              "min_chars": 600,
              "earliest_year_offset": 1
            }
          }
          EOF

      - name: Set up Google credentials
        run: |
          cd 000-099-investing/007-ticker-analysis
          echo '${{ secrets.GDRIVE_API_KEY_JSON }}' > google_service_account.json

      - name: Run cache refresh (technicals only)
        env:
          CACHE_DATE: ${{ steps.date.outputs.date }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          TWELVE_DATA_API_KEY_2: ${{ secrets.TWELVE_DATA_API_KEY_2 }}
          TWELVE_DATA_API_KEY_3: ${{ secrets.TWELVE_DATA_API_KEY_3 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SHEETS_FALLBACK_DIR: /tmp/sheets-fallback
        run: |
          cd 000-099-investing/007-ticker-analysis
          python run_all.py --technicals-only --verbose

      - name: List cached files
        if: always()
        run: |
          echo "=== Cached files ==="
          ls -la ${{ env.CACHE_PATH }}/twelve_data/ | head -20
          echo "Total files: $(ls ${{ env.CACHE_PATH }}/twelve_data/ | wc -l)"

      - name: Upload Sheets fallback CSVs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sheets-fallback-${{ steps.date.outputs.date }}
          path: /tmp/sheets-fallback/
          if-no-files-found: ignore
          retention-days: 7

      - name: Save ticker cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CACHE_PATH }}
          key: ticker-cache-${{ steps.date.outputs.date }}

  # Run alerts after cache refresh
  run-alerts:
    needs: refresh-cache
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get today's date for cache key
        id: date
        run: echo "date=$(TZ=America/Chicago date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore ticker cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CACHE_PATH }}
          key: ticker-cache-${{ steps.date.outputs.date }}
          restore-keys: |
            ticker-cache-
          fail-on-cache-miss: true
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install shared-core
        run: |
          cd 000-099-investing/000-shared-core
          pip install -e .

      - name: Install 008-alerts dependencies
        run: |
          cd 000-099-investing/008-alerts
          pip install -r requirements.txt

      - name: List cache (debug)
        run: |
          echo "=== Cache files ==="
          ls -la ${{ env.CACHE_PATH }}/twelve_data/ | head -10
          echo "Total: $(ls ${{ env.CACHE_PATH }}/twelve_data/ | wc -l) files"

      - name: Debug - Check Supabase env vars
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "=== Supabase Environment Debug ==="
          if [ -n "$SUPABASE_URL" ]; then
            echo "SUPABASE_URL: SET (length: ${#SUPABASE_URL})"
          else
            echo "SUPABASE_URL: NOT SET"
          fi
          if [ -n "$SUPABASE_SERVICE_KEY" ]; then
            echo "SUPABASE_SERVICE_KEY: SET (length: ${#SUPABASE_SERVICE_KEY})"
          else
            echo "SUPABASE_SERVICE_KEY: NOT SET"
          fi

      - name: Run alerts scanner
        env:
          CACHE_DATE: ${{ needs.refresh-cache.outputs.cache-date }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          TWELVE_DATA_API_KEY_2: ${{ secrets.TWELVE_DATA_API_KEY_2 }}
          TWELVE_DATA_API_KEY_3: ${{ secrets.TWELVE_DATA_API_KEY_3 }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          NOTIFICATION_EMAILS: ${{ secrets.NOTIFICATION_EMAILS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd 000-099-investing/008-alerts
          python main.py

  run-reversals:
    needs: refresh-cache
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get today's date for cache key
        id: date
        run: echo "date=$(TZ=America/Chicago date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore ticker cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CACHE_PATH }}
          key: ticker-cache-${{ steps.date.outputs.date }}
          restore-keys: |
            ticker-cache-
          fail-on-cache-miss: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install shared-core
        run: |
          cd 000-099-investing/000-shared-core
          pip install -e .

      - name: Install 009-reversals dependencies
        run: |
          cd 000-099-investing/009-reversals
          pip install -r requirements.txt

      - name: Run reversals scanner
        env:
          CACHE_DATE: ${{ needs.refresh-cache.outputs.cache-date }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          TWELVE_DATA_API_KEY_2: ${{ secrets.TWELVE_DATA_API_KEY_2 }}
          TWELVE_DATA_API_KEY_3: ${{ secrets.TWELVE_DATA_API_KEY_3 }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          NOTIFICATION_EMAILS: ${{ secrets.NOTIFICATION_EMAILS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd 000-099-investing/009-reversals
          python reversals.py

  run-oversold:
    needs: refresh-cache
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get today's date for cache key
        id: date
        run: echo "date=$(TZ=America/Chicago date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore ticker cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CACHE_PATH }}
          key: ticker-cache-${{ steps.date.outputs.date }}
          restore-keys: |
            ticker-cache-

      - name: Verify cache restored
        run: |
          echo "=== Cache status ==="
          if [ -d "${{ env.CACHE_PATH }}/twelve_data" ]; then
            COUNT=$(ls ${{ env.CACHE_PATH }}/twelve_data/*.json 2>/dev/null | wc -l)
            echo "✅ Found $COUNT cached files"
          else
            echo "⚠️ No cache directory found"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install shared-core
        run: |
          cd 000-099-investing/000-shared-core
          pip install -e .

      - name: Install 010-oversold dependencies
        run: |
          cd 000-099-investing/010-oversold
          pip install -r requirements.txt

      - name: Run oversold scanner
        env:
          CACHE_DATE: ${{ needs.refresh-cache.outputs.cache-date }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          TWELVE_DATA_API_KEY_2: ${{ secrets.TWELVE_DATA_API_KEY_2 }}
          TWELVE_DATA_API_KEY_3: ${{ secrets.TWELVE_DATA_API_KEY_3 }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          NOTIFICATION_EMAILS: ${{ secrets.NOTIFICATION_EMAILS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd 000-099-investing/010-oversold
          python oversold.py --all --top 20 --email

      - name: Run true value report
        env:
          CACHE_DATE: ${{ needs.refresh-cache.outputs.cache-date }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          TWELVE_DATA_API_KEY_2: ${{ secrets.TWELVE_DATA_API_KEY_2 }}
          TWELVE_DATA_API_KEY_3: ${{ secrets.TWELVE_DATA_API_KEY_3 }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          NOTIFICATION_EMAILS: ${{ secrets.NOTIFICATION_EMAILS }}
        run: |
          cd 000-099-investing/010-oversold
          python true_value.py --email

  # Notify on failure
  notify-failure:
    runs-on: ubuntu-latest
    needs: [refresh-cache, run-alerts, run-reversals, run-oversold]
    if: failure()
    steps:
      - name: Send failure notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          NOTIFICATION_EMAILS: ${{ secrets.NOTIFICATION_EMAILS }}
          REFRESH_RESULT: ${{ needs.refresh-cache.result }}
          ALERTS_RESULT: ${{ needs.run-alerts.result }}
          REVERSALS_RESULT: ${{ needs.run-reversals.result }}
          OVERSOLD_RESULT: ${{ needs.run-oversold.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          FAILED=""
          [ "$REFRESH_RESULT"   = "failure" ] && FAILED="${FAILED}<li>refresh-cache</li>"
          [ "$ALERTS_RESULT"    = "failure" ] && FAILED="${FAILED}<li>run-alerts</li>"
          [ "$REVERSALS_RESULT" = "failure" ] && FAILED="${FAILED}<li>run-reversals</li>"
          [ "$OVERSOLD_RESULT"  = "failure" ] && FAILED="${FAILED}<li>run-oversold</li>"
          [ -z "$FAILED" ] && FAILED="<li>(unknown — check run page)</li>"
          BODY="<h2>Daily Cache Refresh — failed jobs</h2><ul>${FAILED}</ul><p><a href=\"${RUN_URL}\">View run on GitHub</a></p>"
          jq -nc \
            --arg from "$SENDER_EMAIL" \
            --arg subj "Workflow Failed - $(date +%b\ %d)" \
            --arg html "$BODY" \
            --argjson to "$(printf '%s' "$NOTIFICATION_EMAILS" | jq -R 'split(",") | map(select(length > 0))')" \
            '{from:$from, to:$to, subject:$subj, html:$html}' \
          | curl -sS -X POST https://api.resend.com/emails \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              --data-binary @-
