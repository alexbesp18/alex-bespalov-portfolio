<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}US Hotel Scraper{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        .star { color: #f59e0b; }
        .yield-excellent { color: #22c55e; font-weight: bold; }
        .yield-good { color: #84cc16; }
        .yield-okay { color: #eab308; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <a href="/" class="text-xl font-bold">🏨 US Hotel Scraper</a>
                <div class="flex space-x-4">
                    <a href="/" class="hover:text-blue-200">Deals</a>
                    <a href="/admin/status" class="hover:text-blue-200">Status</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-800 text-gray-400 py-4 mt-8">
        <div class="container mx-auto px-4 text-center text-sm">
            US Hotel Scraper • AA Advantage Hotels Data
        </div>
    </footer>
</body>
</html>
