name: Add Ticker

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Ticker symbol (e.g., AMZN)'
        required: true
        type: string

jobs:
  add:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install setuptools==69.5.1 && pip install -r requirements.txt
      - name: Add ticker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TICKER_INPUT: ${{ inputs.ticker }}
        run: python add_ticker.py "$TICKER_INPUT"
